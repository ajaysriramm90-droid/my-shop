services:
  app:
    image: evershop/evershop:1.2.2
    restart: on-failure
    command: >
      sh -c "npm run setup; npm start"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_PASSWORD: postgres
      DB_USER: postgres
      DB_NAME: postgres
      NODE_ENV: production
    volumes:
      - ./config:/app/config
    networks:
      - myajayshop
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 3000:3000

  # The postgres database:
  database:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - myajayshop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  myajayshop:
    name: MyAjayShop
    driver: bridge

volumes:
  postgres-data:
